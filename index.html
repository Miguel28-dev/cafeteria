<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetería Escolar</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="app">

    <header class="header">
        <h1>Cafetería Escolar</h1>
        <p>Bienvenido</p>
    </header>

    <nav class="menu">
        <button onclick="mostrarSeccion('inicio')">Inicio</button>
        <button onclick="mostrarSeccion('menu')">Menú</button>
        <button onclick="mostrarSeccion('contacto')">Contacto</button>
    </nav>

    <section id="inicio" class="seccion activa">
        <h2>Inicio</h2>
        <div class="card">
            <p>Bienvenido a la cafetería escolar 🍔</p>
        </div>
    </section>

    <section id="menu" class="seccion">
        <h2>Menú</h2>
        <div class="card">Hamburguesa</div>
        <div class="card">Pizza</div>
        <div class="card">Refresco</div>
    </section>

    <section id="contacto" class="seccion">
        <h2>Contacto</h2>
        <div class="card">
            <p>Email: cafeteria@escuela.com</p>
        </div>
    </section>

</div>

<script src="js/app.js"></script>
</body>
</html>
